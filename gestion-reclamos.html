<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/gestion-reclamos.css">
  <title>Gestión de Quejas y Reclamos - Hotel Rincón del Carmen</title>
</head>
<body>

  <header class="main-header">
    <div class="container">
      <a href="index.html" class="logo">Rincón del Carmen</a>
      <nav class="desktop-nav">
        <a href="gestion.html">Habitaciones</a>
        <a href="contacto.html">Contacto</a>
        <a href="list.html" id="admin-link" class="hidden">ADMIN</a>
        <a href="userpanel.html" id="user-panel-link" class="hidden">Panel de Usuario</a>
      </nav>
      <div class="header-actions">
        <a href="iniciarsesion.html" class="btn btn-secondary" id="login-btn">Iniciar Sesión</a>
        <div id="user-info" class="hidden">
          <span id="username-display"></span>
          <a href="#" id="logout-btn" class="btn btn-secondary">Cerrar Sesión</a>
        </div>
      </div>
    </div>
  </header>
  
  <main class="container">
    <section id="gestion-reclamos-section">
        <h2>Gestión de Quejas y Reclamos</h2>
        
        <table id="gestion-reclamos-table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Asunto</th>
                    <th>Usuario</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <div id="respuesta-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Responder a Queja/Reclamo</h3>
            <form id="respuesta-form">
                <input type="hidden" id="respuesta-reclamo-id">
                <div class="form-group">
                    <label for="respuesta-texto">Respuesta:</label>
                    <textarea id="respuesta-texto" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="respuesta-estado">Nuevo Estado:</label>
                    <select id="respuesta-estado" required>
                        <option value="Resuelto">Resuelto</option>
                        <option value="Rechazado">Rechazado</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Enviar Respuesta</button>
                </div>
            </form>
        </div>
    </div>
  </main>

  <footer class="main-footer">
    <p>© 2025 Hotel Rincón del Carmen | Desarrollado por Joseph Garcia</p>
  </footer>

  <script src="./App/Components/gestion/gestion-reclamos.js" type="module"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
