<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/gestionComponent.css">
  <title>Catálogo de Habitaciones - Hotel Rincón del Carmen</title>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    main { animation: fadeIn 0.6s ease-in; }
    .search-bar { animation: slideDown 0.5s ease-out; }
    .habitacion-card { transition: all 0.3s ease; }
    .habitacion-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
  </style>
</head>
<body>

  <header class="main-header">
    <div class="container">
      <a href="index.html" class="logo">Rincón del Carmen</a>
      <nav class="desktop-nav">
        <a href="index.html#habitaciones">Habitaciones</a>
        <a href="contacto.html">Contacto</a>
      </nav>
      <div class="header-actions">
        <a href="iniciarsesion.html" class="btn btn-secondary" id="login-btn">Iniciar Sesión</a>
        <div id="user-info" class="hidden">
          <span id="username-display"></span>
          <a href="#" id="logout-btn" class="btn btn-secondary">Cerrar Sesión</a>
        </div>
      </div>
    </div>
  </header>

  <main class="gestion-container">
    <header class="gestion-header">
      <h1>Nuestro Catálogo</h1>
      <input type="search" id="search-input" placeholder="Buscar por tipo de habitación...">
    </header>
    <div id="habitaciones-grid" class="rooms-grid">
      <p>Cargando habitaciones...</p>
    </div>
  </main>

  <footer class="main-footer">
    <p>© 2025 Hotel Rincón del Carmen | Desarrollado por Joseph Garcia</p>
  </footer>

  <script type="module" src="header-manager.js"></script>
  <script type="module" src="./App/Components/gestion/gestionComponent.js"></script>
</body>
</html>
