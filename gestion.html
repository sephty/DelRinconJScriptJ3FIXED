<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/gestionComponent.css">
  <title>Catálogo de Habitaciones - Hotel Rincón del Carmen</title>
</head>
<body>

  <header class="main-header">
    <div class="container">
      <a href="index.html" class="logo">Rincón del Carmen</a>
      <nav class="desktop-nav">
        <a href="gestion.html">Habitaciones</a>
        <a href="contacto.html">Contacto</a>
        <a href="list.html" id="admin-link" class="hidden">ADMIN</a>
        <a href="userpanel.html" id="user-panel-link" class="hidden">Mis Reservas</a>
        <a href="reclamos.html" id="reclamos-link" class="hidden">Mis Quejas y Reclamos</a>
      </nav>
      <div class="header-actions">
        <a href="iniciarsesion.html" class="btn btn-secondary" id="login-btn">Iniciar Sesión</a>
        <div id="user-info" class="hidden">
          <span id="username-display"></span>
          <a href="#" id="logout-btn" class="btn btn-secondary">Cerrar Sesión</a>
        </div>
      </div>
    </div>
  </header>

  <main class="gestion-container">
    <header class="gestion-header">
      <h1>Nuestro Catálogo</h1>
      <input type="search" id="search-input" placeholder="Buscar por tipo de habitación...">
      <div class="date-search">
        <input type="date" id="date-from">
        <input type="date" id="date-to">
        <button id="date-search-btn" class="btn">Buscar</button>
      </div>
    </header>
    <div id="habitaciones-grid" class="rooms-grid">
      <p>Cargando habitaciones...</p>
    </div>
  </main>

  <footer class="main-footer">
    <p>© 2025 Hotel Rincón del Carmen | Desarrollado por Joseph Garcia</p>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
